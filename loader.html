<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:#f6f1ea;
    color:#5c3d2e;
}

/* ===========================
        LOADER
=========================== */

#loader{
    position:fixed;
    inset:0;
    z-index:999999;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
        radial-gradient(circle at top, rgba(182,141,64,0.18), transparent 40%),
        linear-gradient(135deg,#ffffff,#f7efe7);
    transition:opacity .6s ease, visibility .6s ease;
}

#loader.hide{
    opacity:0;
    visibility:hidden;
}

.loader-box{
    width:min(90%,360px);
    text-align:center;
}

.brand{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(135deg,#b68d40,#5c3d2e);
    color:#fff;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
    animation:float 2s ease-in-out infinite;
}

.loader-title{
    margin-top:25px;
    font-size:28px;
    font-weight:bold;
}

.loader-subtitle{
    margin-top:8px;
    color:#777;
    font-size:14px;
}

/* Progress */

.progress-wrap{
    margin-top:25px;
    width:100%;
    height:8px;
    background:#e6d8c4;
    border-radius:50px;
    overflow:hidden;
}

.progress-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#b68d40,#5c3d2e);
    transition:width .1s linear;
}

/* Percentage */

.loading-text{
    margin-top:18px;
    font-size:30px;
    font-weight:bold;
    color:#b68d40;
    font-variant-numeric:tabular-nums;
}

/* Demo Page */

.page{
    max-width:900px;
    margin:auto;
    padding:100px 20px;
    text-align:center;
}

.page h1{
    font-size:45px;
    margin-bottom:20px;
}

.page p{
    color:#666;
    line-height:1.8;
}

/* Animation */

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@media(max-width:480px){

.loader-title{
    font-size:24px;
}

.loading-text{
    font-size:26px;
}

.page h1{
    font-size:34px;
}

}
</style>

</head>
<body>

<!-- ==========================
        LOADER
=========================== -->

<div id="loader">

    <div class="loader-box">


        <div class="loader-title">
            Loading
        </div>

        <div class="loader-subtitle">
            Please wait...
        </div>

        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="loading-text" id="loadingPercent">
            0%
        </div>

    </div>

</div>

<!-- ==========================
      PAGE CONTENT
=========================== -->

<script>

const loader = document.getElementById("loader");
const progressBar = document.getElementById("progressBar");
const loadingPercent = document.getElementById("loadingPercent");

let progress = 0;

const speed = 18; // Lower = Faster

const loading = setInterval(() => {

    progress++;

    progressBar.style.width = progress + "%";
    loadingPercent.innerHTML = progress + "%";

    if(progress >= 100){

        clearInterval(loading);

        setTimeout(function(){

            loader.classList.add("hide");

        },300);

    }

},speed);

</script>

</body>
