<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Ecommerce</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#111;color:#fff;padding:15px;text-align:center}

.box{padding:20px;text-align:center}
input,button{padding:10px;margin:5px}

.grid{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;padding:20px}

.card{width:250px;background:#fff;padding:10px;border-radius:10px}
.card img{width:100%;height:160px;object-fit:cover}

.admin{background:#fff;padding:15px;margin:10px}
</style>
</head>

<body>

<div class="header">
<h2>REAL ECOMMERCE SYSTEM (Firebase)</h2>
</div>

<!-- LOGIN -->
<div class="box" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<!-- STORE -->
<div id="store" style="display:none">

<button onclick="logout()">Logout</button>

<h3 style="text-align:center">Products</h3>
<div class="grid" id="products"></div>

<!-- ADMIN -->
<div class="admin">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Product Name">
<input id="pprice" placeholder="Price">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Add Product</button>
</div>

</div>

<script>
/* 🔥 FIREBASE INIT */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function signup(){
auth.createUserWithEmailAndPassword(
email.value, password.value
);
}

function login(){
auth.signInWithEmailAndPassword(
email.value, password.value
);
}

function logout(){
auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
if(user){
loginBox.style.display="none";
store.style.display="block";
loadProducts();
}else{
loginBox.style.display="block";
store.style.display="none";
}
});

/* ADD PRODUCT (ADMIN) */
function addProduct(){
db.collection("products").add({
name:pname.value,
price:pprice.value,
img:pimg.value,
created:Date.now()
});
}

/* LOAD PRODUCTS */
function loadProducts(){
db.collection("products").onSnapshot(snap=>{
products.innerHTML="";

snap.forEach(doc=>{
let p=doc.data();

products.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick="addToCart('${doc.id}')">Add to Cart</button>
</div>
`;
});
});
}

/* CART */
function addToCart(id){
let user=auth.currentUser;

db.collection("carts")
.doc(user.uid)
.collection("items")
.add({
productId:id,
qty:1
});

alert("Added to cart");
}
</script>

</body>
</html>
