<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Services</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f5f6fa;
    display:flex;
    justify-content:center;
}

.container{
    width:900px;
    text-align:center;
    padding:40px 20px;
}

h1{
    font-weight:800;
    letter-spacing:2px;
    color:#2d2d2d;
}

.desc{
    color:#555;
    font-size:18px;
    line-height:1.6;
    margin:15px auto 30px;
    max-width:700px;
}

.services{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:40px;
}

.service-box{
    background:#2f2f46;
    color:white;
    padding:18px;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.service-box:hover{
    background:#3c3c5c;
    transform:translateY(-3px);
}

/* VIDEO SECTION */
.video-section{
    position:relative;
    width:100%;
    height:320px;
    border-radius:20px;
    overflow:visible;
}

/* VIDEO */
.video-section video{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:20px;

    /* smooth animation */
    animation:zoom 12s infinite alternate ease-in-out;
}

/* SIDE IMAGES */
.side{
    position:absolute;
    width:150px;
    height:120px;
    border-radius:15px;
    overflow:hidden;
    border:4px solid white;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);

    animation:float 4s ease-in-out infinite;
}

.side img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* LEFT */
.left{
    left:-40px;
    top:50%;
    transform:translateY(-50%);
}

/* RIGHT */
.right{
    right:-40px;
    top:50%;
    transform:translateY(-50%);
}

/* ANIMATIONS */
@keyframes zoom{
    0%{ transform:scale(1); }
    100%{ transform:scale(1.08); }
}

@keyframes float{
    0%{ transform:translateY(-50%) translateY(0px); }
    50%{ transform:translateY(-50%) translateY(-10px); }
    100%{ transform:translateY(-50%) translateY(0px); }
}

/* RESPONSIVE */
@media(max-width:768px){
    .container{width:100%;}
    .services{grid-template-columns:1fr;}
    .side{display:none;}
}
</style>

</head>

<body>

<div class="container">

    <h1>OUR SERVICES</h1>

    <div class="desc">
        We make your home and office look beautiful and comfortable.
        We design and provide quality furniture as per your needs.
    </div>

    <div class="services">
        <div class="service-box">🏠 Interior Design</div>
        <div class="service-box">🛋️ Custom Furniture</div>
        <div class="service-box">🛠️ Renovation / Remodeling</div>
        <div class="service-box">💬 Free Consultation</div>
    </div>

    <!-- VIDEO + SIDE IMAGES -->
    <div class="video-section">

        <!-- AUTOPLAY VIDEO -->
        <video autoplay muted loop playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>

        <!-- LEFT IMAGE -->
        <div class="side left">
            <img src="https://images.unsplash.com/photo-1615873968403-89e068629265">
        </div>

        <!-- RIGHT IMAGE -->
        <div class="side right">
            <img src="https://images.unsplash.com/photo-1615873968403-89e068629265">
        </div>

    </div>

</div>

</body>
</html>
