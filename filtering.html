<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Showcase</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */
.header{
padding:18px;
text-align:center;
background:#111;
color:#fff;
font-size:18px;
}

/* SEARCH BAR */
.search-box{
padding:10px;
text-align:center;
background:#fff;
position:sticky;
top:0;
z-index:100;
}

.search-box input{
width:90%;
max-width:400px;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
outline:none;
font-size:14px;
}

/* CAROUSEL WRAPPER */
.wrapper{
position:relative;
overflow:hidden;
padding:15px;
}

/* CAROUSEL */
.carousel-container{
display:flex;
gap:12px;
overflow-x:auto;
scroll-behavior:auto;
-ms-overflow-style:none;
scrollbar-width:none;
}

.carousel-container::-webkit-scrollbar{
display:none;
}

/* CARD */
.card{
min-width:260px;
max-width:260px;
background:#fff;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
position:relative;
flex-shrink:0;
transition:0.3s;
}

.card.hide{
display:none !important;
}

/* IMAGE */
.card img{
width:100%;
height:180px;
object-fit:cover;
cursor:pointer;
border-radius:12px 12px 0 0;
}

/* BRAND */
.brand{
position:absolute;
top:8px;
left:8px;
background:#000;
color:#fff;
padding:4px 7px;
font-size:11px;
border-radius:5px;
}

/* BADGE */
.badge{
position:absolute;
top:8px;
right:8px;
padding:4px 7px;
font-size:11px;
border-radius:5px;
color:#fff;
}
.new{background:green;}
.sale{background:red;}
.best{background:orange;}

/* CONTENT */
.card-content{
padding:10px;
}

.card h3{font-size:14px;margin-bottom:4px;}
.card p{font-size:11px;color:#555;margin:2px 0;}

.price{
font-weight:bold;
font-size:13px;
}

.old-price{
text-decoration:line-through;
color:red;
font-size:11px;
margin-left:5px;
}

/* BUTTON */
.btn{
margin-top:6px;
width:100%;
padding:7px;
background:#111;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

/* NAV */
.nav{
text-align:center;
margin:10px;
}

.nav button{
padding:10px 14px;
background:#111;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
margin:0 5px;
}

/* RESPONSIVE */
@media(max-width:480px){
.card{
min-width:200px;
max-width:200px;
}
}
</style>
</head>

<body>

<div class="header">
<h2>Premium Furniture Collection</h2>
</div>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search furniture, brand, category...">
</div>

<div class="nav">
<button onclick="scrollLeft()">⬅ Prev</button>
<button onclick="scrollRight()">Next ➡</button>
</div>

<div class="wrapper">
<div class="carousel-container" id="carousel">

<!-- CARD 1 -->
<div class="card">
<div class="brand">Royal Furnish</div>
<div class="badge best">Best</div>
<img src="https://i.pinimg.com/736x/6c/5d/ae/6c5dae4860e9a231a768016c5884e92f.jpg">
<div class="card-content">
<h3>Luxury Sofa Set</h3>
<p>Sofa</p>
<p>Size: 7ft x 3ft</p>
<p>Teak Wood + Fabric</p>
<p class="price">₹28000</p>
<button class="btn">View</button>
</div>
</div>

<!-- CARD 2 -->
<div class="card">
<div class="brand">Urban Wood</div>
<div class="badge new">New</div>
<img src="https://i.pinimg.com/736x/d7/aa/db/d7aadbc166d6f59d9bc95c6551eb197b.jpg">
<div class="card-content">
<h3>King Size Bed</h3>
<p>Bed</p>
<p>Size: 6ft x 6.5ft</p>
<p>Solid Wood</p>
<p class="price">₹32000</p>
<button class="btn">View</button>
</div>
</div>

<!-- duplicate cards keep same format -->
<div class="card">
<div class="brand">Urban Wood</div>
<div class="badge new">New</div>
<img src="https://i.pinimg.com/736x/d7/aa/db/d7aadbc166d6f59d9bc95c6551eb197b.jpg">
<div class="card-content">
<h3>Office Chair</h3>
<p>Chair</p>
<p>Ergonomic Design</p>
<p>Steel Base</p>
<p class="price">₹8500</p>
<button class="btn">View</button>
</div>
</div>

</div>
</div>

<script>

const carousel = document.getElementById("carousel");

/* AUTO DUPLICATE */
carousel.innerHTML += carousel.innerHTML;

/* AUTO SCROLL */
let speed = 0.7;
let run = true;

function autoScroll(){
if(run){
carousel.scrollLeft += speed;
if(carousel.scrollLeft >= carousel.scrollWidth / 2){
carousel.scrollLeft = 0;
}
}
requestAnimationFrame(autoScroll);
}
autoScroll();

/* NAV */
function scrollLeft(){
carousel.scrollBy({left:-300,behavior:"smooth"});
}

function scrollRight(){
carousel.scrollBy({left:300,behavior:"smooth"});
}

/* ===================== */
/* 🔍 SEARCH FILTER */
/* ===================== */

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", function(){

let value = this.value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card =>{

let text = card.innerText.toLowerCase();

if(text.includes(value)){
card.classList.remove("hide");
}else{
card.classList.add("hide");
}

});

});

/* pause scroll when typing */
searchInput.addEventListener("focus",()=>run=false);
searchInput.addEventListener("blur",()=>run=true);

</script>

</body>
</html>
