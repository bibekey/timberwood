<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Showcase</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */
.header{
padding:18px;
text-align:center;
background:#111;
color:#fff;
font-size:18px;
}

/* FILTER */
.filter-box{
display:flex;
flex-wrap:wrap;
gap:12px;
padding:15px;
justify-content:center;
background:#fff;
}

.filter-box input,
.filter-box select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
min-width:180px;
outline:none;
}

/* WRAPPER */
.wrapper{
position:relative;
overflow:hidden;
padding:15px;
}

.carousel-container{
display:flex;
gap:12px;
overflow-x:auto;
scroll-behavior:smooth;
}

.carousel-container::-webkit-scrollbar{display:none;}

/* CARD */
.card{
min-width:260px;
max-width:260px;
background:#fff;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding:15px;
cursor:pointer;
flex-shrink:0;
}

.card h3{font-size:16px;margin-bottom:5px;}
.card p{font-size:13px;color:#555;}

.hide{display:none !important;}

/* ================= POPUP ================= */

.popup-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
padding:10px;
}

.popup{
width:100%;
max-width:900px;
background:#fff;
border-radius:12px;
display:flex;
flex-wrap:wrap;
overflow:hidden;
}

.popup-img{
flex:1;
min-width:280px;
}

.popup-img img{
width:100%;
height:100%;
object-fit:cover;
}

.popup-content{
flex:1;
padding:20px;
max-height:80vh;
overflow-y:auto;
}

.popup-title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.price{
margin:10px 0;
}

.old-price{
text-decoration:line-through;
color:#888;
margin-right:10px;
}

.new-price{
font-size:20px;
font-weight:bold;
}

.badge{
background:#000;
color:#fff;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-left:10px;
}

.section{
margin-top:12px;
}

.section h4{
font-size:14px;
margin-bottom:6px;
}

.section p, .section li{
font-size:13px;
color:#555;
}

.popup-actions{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:10px 14px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.btn-cart{background:#000;color:#fff;}
.btn-whatsapp{background:#25D366;color:#fff;}
.btn-close{background:#ddd;}

.btn-view{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#000;
color:#fff;
cursor:pointer;
font-size:13px;
width:100%;
transition:0.3s;
}

.btn-view:hover{
background:#333;
}

</style>
</head>

<body>

<div class="header">
<h2>Premium Furniture Collection</h2>
</div>

<!-- FILTER -->
<div class="filter-box">

<input type="text" id="searchInput" placeholder="Search..." onkeyup="filterProducts()">

<select id="categoryFilter" onchange="filterProducts()">
<option value="all">All Categories</option>
<option value="Sofa">Sofa</option>
<option value="Bed">Bed</option>
<option value="Office Table">Office Table</option>
<option value="Dining Table">Dining Table</option>
</select>

<select id="brandFilter" onchange="filterProducts()">
<option value="all">All Brands</option>
<option value="TW">TW</option>
<option value="Geeken">Geeken</option>
<option value="Qudo">Qudo</option>
</select>

</div>

<!-- PRODUCTS -->
<div class="wrapper">
<div class="carousel-container">

<div class="card" data-category="Sofa" data-brand="TW"data-image="https://i.pinimg.com/236x/c7/75/17/c77517a4e011f20f88c22fed54d84363.jpg">
  <img src="https://i.pinimg.com/236x/c7/75/17/c77517a4e011f20f88c22fed54d84363.jpg" style="width:100%;height:180px;object-fit:cover;border-radius:10px;">
  <h3>Luxury Sofa</h3>
  <p>Premium Sofa Set</p>

  <button class="btn-view" onclick="showProduct(this)">View Details</button>
</div>

<div class="card" data-category="Bed" data-brand="TW" onclick="showProduct(this)">
<h3>King Bed</h3>
<p>Wood Bed</p>
</div>

<div class="card" data-category="Dining Table" data-brand="Qudo" onclick="showProduct(this)">
<h3>Dining Set</h3>
<p>6 Seater</p>
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup">

<div class="popup">

<div class="popup-img">
<img id="popupImage" src="https://via.placeholder.com/600">
</div>

<div class="popup-content">

<div class="popup-title" id="popupTitle">Product</div>

<div class="price">
<span class="old-price" id="oldPrice">Rs. 97,000</span>
<span class="new-price" id="newPrice">Rs. 87,000</span>
<span class="badge">10% OFF</span>
</div>

<div class="section">
<h4>Key Highlights</h4>
<p id="highlights"></p>
</div>

<div class="section">
<h4>Specifications</h4>
<p id="specs"></p>
</div>

<div class="section">
<h4>Features</h4>
<ul id="features"></ul>
</div>

<div class="section">
<h4>Delivery</h4>
<p>Free delivery | Installation available | 3–7 days</p>
</div>

<div class="section">
<h4>Warranty</h4>
<p>1 Year / 5 Years</p>
</div>

<div class="popup-actions">

<button class="btn btn-cart">Add to Cart</button>

<button class="btn btn-whatsapp" onclick="sendWhatsApp()">
📲 WhatsApp Order
</button>

<button class="btn btn-close" onclick="closePopup()">Close</button>

</div>

</div>
</div>

</div>

<script>

/* FILTER */
function filterProducts(){
let search=document.getElementById("searchInput").value.toLowerCase();
let category=document.getElementById("categoryFilter").value;
let brand=document.getElementById("brandFilter").value;

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{
let text=card.innerText.toLowerCase();
let cat=card.getAttribute("data-category");
let br=card.getAttribute("data-brand");

let matchSearch=text.includes(search);
let matchCategory=(category==="all"||cat===category);
let matchBrand=(brand==="all"||br===brand);

if(matchSearch&&matchCategory&&matchBrand){
card.classList.remove("hide");
}else{
card.classList.add("hide");
}
});
}

/* OPEN POPUP */
function showProduct(btn){

let card = btn.closest(".card");

let title = card.querySelector("h3").innerText;
let image = card.getAttribute("data-image");

document.getElementById("popup").style.display="flex";

document.getElementById("popupTitle").innerText = title;
document.getElementById("popupImage").src = image;

document.getElementById("oldPrice").innerText = "Rs. 97,000";
document.getElementById("newPrice").innerText = "Rs. 87,000";

document.getElementById("highlights").innerText =
"Premium Quality | Modern Design | In Stock";

document.getElementById("specs").innerText =
"Plywood + Laminated Finish | Fabric Cushion | Strong Build";

document.getElementById("features").innerHTML = `
<li>Premium finish</li>
<li>Durable structure</li>
<li>Comfortable seating</li>
<li>Easy maintenance</li>
`;
}

/* CLOSE POPUP */
function closePopup(){
document.getElementById("popup").style.display="none";
}

/* WHATSAPP AUTO MESSAGE */
function sendWhatsApp(){

let productName=document.getElementById("popupTitle").innerText;
let price=document.getElementById("newPrice").innerText;
let oldPrice=document.getElementById("oldPrice").innerText;
let highlights=document.getElementById("highlights").innerText;

/* YOUR NUMBER */
let phone="9779705020251";

let message=`
🪑 Furniture Order Request

📌 Product: ${productName}
💰 Price: ${price}
~~${oldPrice}~~

📏 Details: ${highlights}

🙏 Please confirm availability & delivery.
`;

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

window.open(url,"_blank");
}

</script>

</body>
</html>
