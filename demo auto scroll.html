<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Showcase</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

/* HEADER */
.header{
padding:18px;
text-align:center;
background:#111;
color:#fff;
font-size:18px;
}

/* SEARCH + FILTER */
.filter-box{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:15px;
justify-content:center;
background:#fff;
}

.filter-box input,
.filter-box select{
padding:10px;
border:1px solid #ccc;
border-radius:8px;
min-width:180px;
outline:none;
}

/* CAROUSEL WRAPPER */
.wrapper{
position:relative;
overflow:hidden;
padding:15px;
}

/* CAROUSEL */
.carousel-container{
display:flex;
gap:12px;
overflow-x:auto;
scroll-behavior:auto;
-ms-overflow-style:none;
scrollbar-width:none;
}

.carousel-container::-webkit-scrollbar{display:none;}

/* CARD */
.card{
min-width:260px;
max-width:260px;
background:#fff;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
position:relative;
flex-shrink:0;
}

/* HIDE FILTER */
.hide{display:none !important;}
</style>
</head>

<body>

<div class="header">
<h2>Premium Furniture Collection</h2>
</div>

<!-- 🔍 SEARCH + FILTERS -->
<div class="filter-box">

<input type="text" id="searchInput" placeholder="🔍 Search products..." onkeyup="filterProducts()">

<select id="categoryFilter" onchange="filterProducts()">
<option value="all">All Categories</option>
<option value="Bed">Bed</option>
<option value="Sofa">Sofa</option>
<option value="Center Table">Center Table</option>
<option value="TV Cabinet">TV Cabinet</option>
<option value="Office Table">Office Table</option>
<option value="Dining Table">Dining Table</option>
<option value="Dining Chair">Dining Chair</option>
<option value="Shoe Rack">Shoe Rack</option>
</select>

<select id="brandFilter" onchange="filterProducts()">
<option value="all">All Brands</option>
<option value="TW">TimberWood (TW)</option>
<option value="Geeken">Geeken</option>
<option value="Qudo">Qudo</option>
<option value="Sleepwell">Sleepwell</option>
</select>

</div>

<!-- CAROUSEL -->
<div class="wrapper">
<div class="carousel-container" id="carousel">

<!-- CARD -->
<div class="card" data-category="Sofa" data-brand="TW">
<h3>Luxury Sofa Set</h3>
<p>Premium Sofa</p>
</div>

<div class="card" data-category="Bed" data-brand="TW">
<h3>King Size Bed</h3>
<p>Wood Bed</p>
</div>

<div class="card" data-category="Office Table" data-brand="Geeken">
<h3>Office Chair</h3>
<p>Ergonomic Chair</p>
</div>

<div class="card" data-category="Dining Table" data-brand="Qudo">
<h3>Dining Set</h3>
<p>6 Seater</p>
</div>

</div>
</div>

<script>

function filterProducts(){
let search = document.getElementById("searchInput").value.toLowerCase();
let category = document.getElementById("categoryFilter").value;
let brand = document.getElementById("brandFilter").value;

let cards = document.querySelectorAll(".card");

cards.forEach(card => {

let text = card.innerText.toLowerCase();
let cat = card.getAttribute("data-category");
let br = card.getAttribute("data-brand");

let matchSearch = text.includes(search);
let matchCategory = (category === "all" || cat === category);
let matchBrand = (brand === "all" || br === brand);

if(matchSearch && matchCategory && matchBrand){
card.classList.remove("hide");
}else{
card.classList.add("hide");
}

});

}

</script>

</body>
</html>
