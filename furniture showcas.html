<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Showcase</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}

body{background:#f5f5f5;}

.header{
padding:20px;text-align:center;background:#111;color:#fff;
}

.controls{
display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
padding:15px;background:#fff;position:sticky;top:0;z-index:10;
}

.controls input,.controls select{
padding:10px;border:1px solid #ddd;border-radius:8px;min-width:200px;
}

.carousel-container{overflow:hidden;padding:20px;}

.carousel{
display:flex;gap:15px;overflow-x:auto;scroll-behavior:smooth;
padding-bottom:10px;
}

.carousel::-webkit-scrollbar{display:none;}

.card{
min-width:280px;background:#fff;border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
position:relative;flex-shrink:0;
transition:0.3s;
}

.card:hover{transform:scale(1.03);}

.card img{
width:100%;height:200px;object-fit:cover;
border-radius:12px 12px 0 0;cursor:pointer;
}

.brand{
position:absolute;top:10px;left:10px;
background:#000;color:#fff;padding:5px 8px;
font-size:12px;border-radius:5px;
}

.badge{
position:absolute;top:10px;right:10px;
padding:5px 8px;font-size:12px;border-radius:5px;color:#fff;
}

.new{background:green;}
.sale{background:red;}
.best{background:orange;}

.card-content{padding:10px;}

.card h3{font-size:16px;margin-bottom:5px;}
.card p{font-size:12px;color:#555;margin:3px 0;}

.price{font-weight:bold;color:#000;}
.old-price{text-decoration:line-through;color:red;margin-left:5px;font-size:12px;}

.btn{
margin-top:8px;width:100%;padding:8px;
background:#111;color:#fff;border:none;border-radius:6px;
cursor:pointer;
}

.nav-buttons{text-align:center;margin:10px;}

.nav-buttons button{
padding:10px 15px;margin:5px;
background:#111;color:#fff;border:none;border-radius:6px;
cursor:pointer;
}

/* POPUP */
.popup,.lightbox{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;align-items:center;
z-index:1000;
}

.popup-content{
background:#fff;padding:20px;width:90%;max-width:500px;
border-radius:10px;
}

.popup img{
width:100%;border-radius:10px;margin-bottom:10px;
}

.close{float:right;cursor:pointer;font-size:18px;}

/* LIGHTBOX */
.lightbox img{
max-width:90%;
max-height:90%;
}

/* AUTO SCROLL EFFECT */
.carousel{
animation: scroll 25s linear infinite;
}

.carousel:hover{
animation-play-state:paused;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}
</style>
</head>

<body>

<div class="header">
<h2>Premium Furniture Collection</h2>
</div>

<div class="controls">
<input type="text" id="search" placeholder="Search furniture...">

<select id="category">
<option value="all">All Categories</option>
<option>Sofa</option>
<option>Bed</option>
<option>Dining Chair</option>
<option>Dining Table</option>
<option>Office Chair</option>
<option>Cafeteria Chair</option>
<option>Centre Table</option>
<option>Shoe Rack</option>
</select>
</div>

<div class="nav-buttons">
<button onclick="scrollLeft()">⬅ Prev</button>
<button onclick="scrollRight()">Next ➡</button>
</div>

<div class="carousel-container">
<div class="carousel" id="carousel">

<!-- CARD 1 -->
<div class="card">
<div class="brand">Royal Furnish</div>
<div class="badge best">Best</div>
<img src="https://i.pinimg.com/736x/6c/5d/ae/6c5dae4860e9a231a768016c5884e92f.jpg" onclick="openLightbox(this.src)">
<div class="card-content">
<h3>Luxury Sofa Set</h3>
<p>Sofa</p>
<p>Size: 7ft x 3ft</p>
<p>Teak Wood + Fabric</p>
<p class="price">₹28000 <span class="old-price">₹35000</span></p>
<button class="btn" onclick="openPopup('Luxury Sofa','₹28000','Premium wooden sofa set')">View Details</button>
</div>
</div>

<!-- CARD 2 -->
<div class="card">
<div class="brand">Urban Wood</div>
<div class="badge new">New</div>
<img src="https://i.pinimg.com/736x/d7/aa/db/d7aadbc166d6f59d9bc95c6551eb197b.jpg" onclick="openLightbox(this.src)">
<div class="card-content">
<h3>King Size Bed</h3>
<p>Bed</p>
<p>Size: 6ft x 6.5ft</p>
<p>Solid Wood</p>
<p class="price">₹32000 <span class="old-price">₹40000</span></p>
<button class="btn" onclick="openPopup('King Bed','₹32000','Premium wooden bed')">View Details</button>
</div>
</div>

<!-- CARD 3 -->
<div class="card">
<div class="brand">Prime Living</div>
<img src="https://i.pinimg.com/736x/02/84/9d/02849d206c198ad362748a1944fd8570.jpg" onclick="openLightbox(this.src)">
<div class="card-content">
<h3>Dining Table Set</h3>
<p>Dining Table</p>
<p>₹18000</p>
<button class="btn" onclick="openPopup('Dining Table','₹18000','Glass top dining set')">View Details</button>
</div>
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
<div class="popup-content" onclick="event.stopPropagation()">
<span class="close" onclick="closePopup()">✖</span>
<h2 id="pname"></h2>
<p id="pprice"></p>
<p id="pdesc"></p>
</div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
<img id="lightimg">
</div>

<script>

/* POPUP */
function openPopup(name,price,desc){
document.getElementById("popup").style.display="flex";
document.getElementById("pname").innerText=name;
document.getElementById("pprice").innerText=price;
document.getElementById("pdesc").innerText=desc;
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* LIGHTBOX */
function openLightbox(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=src;
}

/* SCROLL */
let carousel = document.getElementById("carousel");

function scrollLeft(){
carousel.scrollBy({left:-300,behavior:"smooth"});
}

function scrollRight(){
carousel.scrollBy({left:300,behavior:"smooth"});
}

</script>

</body>
</html>
